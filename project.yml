name: SwitchUI
options:
  bundleIdPrefix: com.realcyber
targets:
  SwitchUI:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - Sources
      - Assets.xcassets  # This tells it to look for the icons here
      - smash.png
      - kart.png
      - party.png
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_NOTICES: NO
        ASSETCATALOG_WARNINGS: NO
        GENERATE_INFOPLIST_FILE: YES
        TARGETED_DEVICE_FAMILY: "1,2"
    info:
      plist:
        CFBundleDisplayName: SwitchUI
        UILaunchScreen: {}
