name: SwitchUI
options:
  bundleIdPrefix: com.r3alcyb3r
  # This setting helps clear "Ghost" files and Red text by re-mapping
  createIntermediateGroups: true 

targets:
  SwitchUI:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      # This is the "GPS" that fixes the Red X
      - path: App
      - path: Views
      - path: Services
      - path: Sources
      - path: Assets.xcassets
    settings:
      # This links the icon set inside Assets.xcassets
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      GENERATE_INFOPLIST_FILE: YES
      MARKETING_VERSION: 1.0.0
      CURRENT_PROJECT_VERSION: 1
      PRODUCT_BUNDLE_IDENTIFIER: com.r3alcyb3r.SwitchUI
      SWIFT_VERSION: 5.0
    info:
      plist:
        CFBundleDisplayName: SwitchUI
        CFBundleName: SwitchUI
        # Ensures the status bar looks right on your iPhone 8 Plus
        UIStatusBarStyle: UIStatusBarStyleLightContent
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
