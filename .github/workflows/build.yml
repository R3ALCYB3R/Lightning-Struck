name: Build Local IPA
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Project
        run: xcodegen generate

      - name: Build Archive
        run: |
          xcodebuild archive \
            -project SwitchUI.xcodeproj \
            -scheme SwitchUI \
            -archivePath build/Local.xcarchive \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO

      - name: Package IPA
        run: |
          mkdir Payload
          APP_PATH=$(find build/Local.xcarchive/Products/Applications -name "*.app" -maxdepth 1)
          cp -r "$APP_PATH" Payload/
          zip -r LocalBuild.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-unsigned-ipa
          path: LocalBuild.ipa
