name: SwitchUI
options:
  bundleIdPrefix: com.r3alcyb3r
targets:
  SwitchUI:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - path: Sources  # This points to your folder
      - path: smash.png
      - path: kart.png
      - path: party.png
      - path: header.png
      - path: click.mp3
      - path: jit.js
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO 
        INFOPLIST_FILE: Info.plist
        CODE_SIGN_ENTITLEMENTS: Entitlements.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.r3alcyb3r.switchui
