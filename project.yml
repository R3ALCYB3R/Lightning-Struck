name: SwitchUI
options:
  bundleIdPrefix: com.r3alcyb3r
  # This setting is the "Red X Killer" — it re-maps everything automatically
  createIntermediateGroups: true 

targets:
  SwitchUI:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      # These MUST match your folder names on GitHub exactly
      - path: App
      - path: Views
      - path: Services
      - path: Sources
      - path: Assets.xcassets
    settings:
      # This connects the icon set inside Assets.xcassets
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      GENERATE_INFOPLIST_FILE: YES
      MARKETING_VERSION: 1.0.0
      CURRENT_PROJECT_VERSION: 1
      PRODUCT_BUNDLE_IDENTIFIER: com.r3alcyb3r.SwitchUI
      SWIFT_VERSION: 5.0
    info:
      plist:
        CFBundleDisplayName: SwitchUI
        CFBundleName: SwitchUI
        UIStatusBarStyle: UIStatusBarStyleLightContent
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
