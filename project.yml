name: SwitchUI
options:
  bundleIdPrefix: com.r3alcyb3r
  # This is the "Red X Killer" - it forces Xcode to refresh the folders
  createIntermediateGroups: true 
  indentWidth: 4
  tabWidth: 4

targets:
  SwitchUI:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      # This MUST match your GitHub sidebar exactly
      - path: App
      - path: Views
      - path: Sources
      - path: Services
      - path: Assets.xcassets
    settings:
      # Links your icon from Assets.xcassets/AppIcon.appiconset
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      GENERATE_INFOPLIST_FILE: YES
      MARKETING_VERSION: 1.0.0
      CURRENT_PROJECT_VERSION: 1
      PRODUCT_BUNDLE_IDENTIFIER: com.r3alcyb3r.SwitchUI
      SWIFT_VERSION: 5.0
    info:
      plist:
        CFBundleDisplayName: SwitchUI
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
