name: Build IPA
on: [push, pull_request]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4 # Updated to v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build App
        run: |
          xcodebuild archive \
            -project SwitchUI.xcodeproj \
            -scheme SwitchUI \
            -archivePath SwitchUI.xcarchive \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO

      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -r SwitchUI.xcarchive/Products/Applications/SwitchUI.app Payload/
          zip -r SwitchUI.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4 # THIS FIXED THE ERROR
        with:
          name: SwitchUI-IPA
          path: SwitchUI.ipa
