name: SwitchUI
options:
  bundleIdPrefix: com.r3alcyb3r
  # This automatically cleans up "Ghost" files and Red Xs
  createIntermediateGroups: true 

targets:
  SwitchUI:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      # This tells Xcode exactly where to look for your code
      - path: App
      - path: Views
      - path: Services
      - path: Sources
      - path: Assets.xcassets
    settings:
      # This connects the icon we put in Assets.xcassets
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      GENERATE_INFOPLIST_FILE: YES
      MARKETING_VERSION: 1.0.0
      CURRENT_PROJECT_VERSION: 1
      PRODUCT_BUNDLE_IDENTIFIER: com.r3alcyb3r.SwitchUI
      SWIFT_VERSION: 5.0
    info:
      plist:
        CFBundleDisplayName: SwitchUI
        CFBundleName: SwitchUI
        UILaunchScreen:
          UIImageName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
