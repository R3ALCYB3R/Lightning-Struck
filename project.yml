name: SwitchUI
options:
  bundleIdPrefix: com.r3alcyb3r
  createIntermediateGroups: true 

targets:
  SwitchUI:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      # This tells the robot to just look everywhere for your files
      - App
      - Views
      - Sources
      - Assets.xcassets
    settings:
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      GENERATE_INFOPLIST_FILE: YES
      PRODUCT_BUNDLE_IDENTIFIER: com.r3alcyb3r.SwitchUI
      SWIFT_VERSION: 5.0
