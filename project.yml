name: SwitchUI
options:
  bundleIdPrefix: com.r3alcyb3r
  # This setting forces the GitHub Action to rebuild the folder links
  createIntermediateGroups: true 

targets:
  SwitchUI:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      # This matches your iPad folder structure exactly
      - path: App
      - path: Views
      - path: Sources
      - path: Services
      - path: Assets.xcassets
    settings:
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      GENERATE_INFOPLIST_FILE: YES
      PRODUCT_BUNDLE_IDENTIFIER: com.r3alcyb3r.SwitchUI
      SWIFT_VERSION: 5.0
    info:
      plist:
        CFBundleDisplayName: SwitchUI
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
