name: SwitchUI
options:
  bundleIdPrefix: com.realcyber
targets:
  SwitchUI:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - Sources
      - Assets.xcassets
      - smash.png
      - kart.png
      - party.png
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO 
        INFOPLIST_FILE: Info.plist
        CODE_SIGN_ENTITLEMENTS: Entitlements.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.realcyber.switchui
        TARGETED_DEVICE_FAMILY: "1,2"
    info:
      plist:
        UILaunchScreen: {}
