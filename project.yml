name: SwitchUI
options:
  bundleIdPrefix: com.r3alcyb3r
  createIntermediateGroups: true 

targets:
  SwitchUI:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      # This tells Xcode: "Check Sources FIRST for the App file"
      - path: Sources
      - path: App
      - path: Views
      - path: Services
      - path: Assets.xcassets
    settings:
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      GENERATE_INFOPLIST_FILE: YES
      PRODUCT_BUNDLE_IDENTIFIER: com.r3alcyb3r.SwitchUI
      SWIFT_VERSION: 5.0
