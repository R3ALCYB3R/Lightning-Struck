name: Build Local IPA
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Auto-Detect and Build
        run: |
          # 1. Find the .xcodeproj or .xcworkspace automatically
          PROJECT=$(ls -d *.xcodeproj 2>/dev/null | head -n 1 || ls -d *.xcworkspace 2>/dev/null | head -n 1)
          
          # 2. Find the first available Scheme
          SCHEME=$(xcodebuild -list -project "$PROJECT" -json | jq -r '.project.schemes[0]' 2>/dev/null || xcodebuild -list -workspace "$PROJECT" -json | jq -r '.workspace.schemes[0]')
          
          echo "Found Project: $PROJECT"
          echo "Found Scheme: $SCHEME"

          # 3. Build the Archive (No Signing)
          xcodebuild archive \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -archivePath unsigned.xcarchive \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Create IPA (The Payload Trick)
        run: |
          mkdir Payload
          # This finds the .app inside the archive and moves it to Payload
          APP_PATH=$(find unsigned.xcarchive/Products/Applications -name "*.app" -maxdepth 1)
          cp -r "$APP_PATH" Payload/
          zip -r LocalBuild.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-unsigned-ipa
          path: LocalBuild.ipa
