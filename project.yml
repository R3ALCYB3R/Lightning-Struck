name: SwitchUI
options:
  bundleIdPrefix: com.r3alcyb3r
  createIntermediateGroups: true 

targets:
  SwitchUI:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      # This matches your iPad folders exactly
      - path: App
      - path: Views
      - path: Sources
      - path: Assets.xcassets
      # Note: If 'Services' is empty, I've removed it for now 
      # so the Red X doesn't happen because of an empty path.
    settings:
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      GENERATE_INFOPLIST_FILE: YES
      PRODUCT_BUNDLE_IDENTIFIER: com.r3alcyb3r.SwitchUI
      SWIFT_VERSION: 5.0
