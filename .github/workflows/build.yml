name: Build Local IPA
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Find and Build Workspace
        run: |
          # 1. Look for .xcworkspace first, then .xcodeproj
          WORKSPACE=$(find . -name "*.xcworkspace" | head -n 1)
          PROJECT=$(find . -name "*.xcodeproj" | head -n 1)
          
          if [ -n "$WORKSPACE" ]; then
            echo "✅ Found Workspace: $WORKSPACE"
            # Get the first scheme from the workspace
            SCHEME=$(xcodebuild -list -workspace "$WORKSPACE" -json | jq -r '.workspace.schemes[0]')
            
            xcodebuild archive \
              -workspace "$WORKSPACE" \
              -scheme "$SCHEME" \
              -archivePath build/Local.xcarchive \
              -sdk iphoneos \
              -configuration Release \
              CODE_SIGNING_ALLOWED=NO
          else
            echo "✅ Found Project: $PROJECT"
            SCHEME=$(xcodebuild -list -project "$PROJECT" -json | jq -r '.project.schemes[0]')
            
            xcodebuild archive \
              -project "$PROJECT" \
              -scheme "$SCHEME" \
              -archivePath build/Local.xcarchive \
              -sdk iphoneos \
              -configuration Release \
              CODE_SIGNING_ALLOWED=NO
          fi

      - name: Export Payload
        run: |
          mkdir Payload
          # This pulls the compiled app out of the archive
          APP_PATH=$(find build/Local.xcarchive/Products/Applications -name "*.app" -maxdepth 1)
          cp -r "$APP_PATH" Payload/
          zip -r LocalBuild.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: my-local-ipa
          path: LocalBuild.ipa
